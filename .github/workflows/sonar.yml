name: SonarQube Cloud scan

# Opt in to Node 24 for JS-based Actions (checkout, setup-node, etc.)
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Build & test (adjust to your stack)
      - name: Use Node.js 20 for your project runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Unit tests with coverage
        run: npm test -- --coverage

      - name: SonarQube Scan (SonarQube Cloud)
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # SONAR_HOST_URL is not required for SonarQube Cloud
