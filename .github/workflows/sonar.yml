- uses: actions/checkout@v4
  with:
    fetch-depth: 0

# Keep the GitHub Actions runtime future-proof (see earlier message)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

- name: Use Node.js 20 for the app
  uses: actions/setup-node@v4
  with:
    node-version: 20
    cache: npm

# (If you need private registry access, add the ~/.npmrc step here)

- name: Install deps
  run: |
    node -v
    npm -v
    if [ -f package-lock.json ]; then
      npm ci --no-audit --no-fund
    else
      npm install --no-audit --no-fund
    fi

- name: Run tests (with coverage)
  run: npm test -- --coverage

- name: SonarQube Scan (SonarQube Cloud)
  uses: SonarSource/sonarqube-scan-action@v7
  env:
    SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


# Show npm debug info if anything above failed
#Changing something in the code
- name: Show npm debug log (if any)
  if: failure()
  run: |
    echo "---- npm debug files ----"
    find . -name "npm-*.log" -maxdepth 2 -print -exec sed -n '1,200p' {} \;
